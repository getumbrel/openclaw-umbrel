services:
  openclaw:
    build:
      context: .
      args:
        OPENCLAW_VERSION: "2026.5.28"
    image: openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    init: true
    environment:
      APP_SEED: ${APP_SEED:-dev}
    ports:
      - "18789:18789"
    volumes:
      - $PWD/data:/data
      - $PWD/data/linuxbrew:/home/linuxbrew
